name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests -q

      - name: Smoke test profiling helper
        run: python tablelore/scripts/table_profile.py tests/fixtures/customer_churn_sample.csv --target churned

      - name: Regenerate dogfood evidence
        run: python dogfood/com47/run_dogfood.py
